version: '3.8'

services:
  backend:
    image: python:3.12-slim
    container_name: smart_health_backend
    working_dir: /app/server
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && 
             alembic upgrade head && 
             fastapi dev main.py --host 0.0.0.0 --port 8000"

  frontend:
    image: node:22-slim
    container_name: smart_health_frontend
    working_dir: /app/client
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"

  mysql:
    container_name: shp-mysql
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    restart: always
    volumes:
      - mysql_volumes:/var/lib/mysql
    ports:
      - "${MYSQL_PORT}:3306"

  qwen-api:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: qwen-api
    ports:
      - "8001:8001"
    volumes:
      - llama_cache:/root/.cache/llama.cpp
    command: >
      -hf unsloth/Qwen3.5-2B-GGUF:UD-Q2_K_XL
      --host 0.0.0.0
      --port 8001
      --ctx-size 4096
      --threads 4
      --temp 0.7
      --top-p 0.8 
      --top-k 20 
      --min-p 0.00 
      --chat-template-kwargs '{"enable_thinking":false}'
      --no-webui
      --api-key ${OPENAI_API_KEY}

volumes:
  mysql_volumes:
  llama_cache: